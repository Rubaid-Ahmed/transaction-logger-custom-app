<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#233247" />
  <title>Custom Transaction Logger</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <p class="eyebrow">Private Ledger</p>
        <h1 data-bind="app-title">Transaction Logger</h1>
        <p data-bind="owner-name">New User</p>
      </div>
      <nav class="nav" aria-label="Primary">
        <a href="#/dashboard" data-route="dashboard">Dashboard</a>
        <a href="#/log" data-route="log">Log</a>
        <a href="#/tuition" data-route="tuition">Tuition</a>
        <a href="#/students" data-route="students">Students</a>
        <a href="#/history" data-route="history">History</a>
        <a href="#/settings" data-route="settings">Settings</a>
      </nav>
      <div class="server-chip" id="serverStatus">Loading...</div>
    </aside>
    <main class="main">
      <div id="app" aria-live="polite"></div>
    </main>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="./app.js"></script>
</body>
</html>
